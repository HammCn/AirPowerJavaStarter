server:
  port: 8080
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/spms?allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8&useSSL=false
    username: service
    password: service
  mvc:
    view:
      suffix: .html
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456

  mqtt:
    host: 127.0.0.1
    port: 1883
    user: root
    pass: 123456
#应用配置
application:
  loginUrl: "https://hamm.cn/login"